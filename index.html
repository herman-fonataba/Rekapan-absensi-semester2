<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Rekapan Kehadiran Semester 2 - Sakit, Izin, Alpa</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* Body TIDAK BISA SCROLL, hanya tabel yang scroll */
        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', 'Noto Sans', sans-serif;
            background: #eef2f7;
            color: #1a2c3e;
            display: flex;
            flex-direction: column;
            padding: 8px;
        }

        /* container utama */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 24px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }

        /* HEADER */
        h1 {
            font-size: 1.4rem;
            font-weight: 700;
            padding: 16px 16px 10px 16px;
            margin: 0;
            background: white;
            border-bottom: 1px solid #e9edf2;
            flex-shrink: 0;
        }

        /* search bar */
        .search-bar {
            padding: 10px 12px;
            background: white;
            border-bottom: 1px solid #eef2f6;
            flex-shrink: 0;
        }

        .search-bar input {
            width: 100%;
            padding: 10px 14px;
            font-size: 0.9rem;
            border: 1px solid #cddfe8;
            border-radius: 44px;
            background: #ffffff;
            transition: 0.2s;
            outline: none;
            font-family: inherit;
        }

        .search-bar input:focus {
            border-color: #2c7da0;
            box-shadow: 0 0 0 3px rgba(44, 125, 160, 0.1);
        }

        /* indikator geser untuk HP */
        .swipe-indicator {
            text-align: center;
            font-size: 0.7rem;
            color: #f5a623;
            background: #fff8e7;
            padding: 6px 12px;
            border-bottom: 1px solid #ffe0b3;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .swipe-indicator span {
            font-size: 1rem;
        }

        /* HANYA TABEL WRAPPER YANG BISA SCROLL (VERTIKAL & HORIZONTAL) */
        .table-wrapper {
            flex: 1;
            overflow: auto;
            -webkit-overflow-scrolling: touch;
            background: white;
            scroll-behavior: smooth;
        }

        /* TABEL - lebar cukup untuk menampung semua kolom di HP dengan nyaman */
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
            min-width: 550px;
        }

        /* Sticky header */
        thead th {
            position: sticky;
            top: 0;
            background: #f2f6fc;
            color: #1a4d6b;
            font-weight: 700;
            padding: 12px 6px;
            font-size: 0.8rem;
            text-align: center;
            border-bottom: 2px solid #dce5ec;
            z-index: 12;
            white-space: nowrap;
        }

        td {
            padding: 10px 6px;
            border-bottom: 1px solid #ecf3f8;
            text-align: center;
            vertical-align: middle;
            font-size: 0.8rem;
            transition: background-color 0.2s ease;
        }

        /* Kolom NAMA rata kiri - bisa diklik */
        td:nth-child(2) {
            text-align: left;
            font-weight: 500;
            color: #0f3b5c;
            background-color: #fefefe;
            word-break: break-word;
            white-space: normal;
            min-width: 140px;
            cursor: pointer;
        }

        td:nth-child(2):hover {
            background-color: #e6f0fa !important;
            text-decoration: underline;
        }

        /* kelas untuk baris yang dipilih */
        .row-selected td {
            background-color: #fff2db !important;
            border-left: 3px solid #f5a623;
            border-right: 3px solid #f5a623;
        }

        .row-selected td:nth-child(2) {
            background-color: #ffe6b3 !important;
            font-weight: 700;
        }

        td:first-child, th:first-child {
            padding-left: 10px;
            text-align: center;
            font-weight: 500;
            white-space: nowrap;
        }

        /* Gaya angka Sakit, Izin, Alpa - jelas dan warna berbeda */
        .number-cell {
            font-family: 'SF Mono', 'Courier New', monospace;
            font-weight: 700;
            font-size: 0.9rem;
        }
        .sakit { 
            color: #2b6e2b; 
            background-color: #f0f9f0;
            border-radius: 20px;
            display: inline-block;
            min-width: 32px;
            padding: 2px 4px;
        }
        .izin { 
            color: #e68a2e; 
            font-weight: 700;
            background-color: #fff4e6;
            border-radius: 20px;
            display: inline-block;
            min-width: 32px;
            padding: 2px 4px;
        }
        .alpa { 
            color: #c72a2a; 
            font-weight: 700;
            background-color: #ffe6e6;
            border-radius: 20px;
            display: inline-block;
            min-width: 32px;
            padding: 2px 4px;
        }

        /* agar sel angka lebih rapi */
        td:nth-child(3), td:nth-child(4), td:nth-child(5) {
            text-align: center;
        }

        tr:hover td {
            background-color: #fafdff;
        }

        /* footer */
        .bottom-note {
            text-align: center;
            font-size: 0.65rem;
            color: #8ba3bc;
            padding: 8px 12px;
            border-top: 1px solid #eef2f6;
            background: #ffffff;
            flex-shrink: 0;
        }

        /* HP khusus - tampilan lebih nyaman */
        @media (max-width: 640px) {
            body {
                padding: 6px;
            }
            h1 {
                font-size: 1.2rem;
                padding: 12px 14px 8px 14px;
            }
            .search-bar input {
                padding: 8px 12px;
                font-size: 0.85rem;
            }
            thead th {
                padding: 8px 4px;
                font-size: 0.7rem;
            }
            td {
                padding: 8px 4px;
                font-size: 0.72rem;
            }
            td:nth-child(2) {
                min-width: 120px;
                font-size: 0.75rem;
            }
            .number-cell {
                font-size: 0.8rem;
            }
            .swipe-indicator {
                font-size: 0.65rem;
                padding: 4px 8px;
            }
        }

        /* Laptop & desktop lebih lega */
        @media (min-width: 1024px) {
            body {
                padding: 20px;
            }
            h1 {
                font-size: 1.9rem;
                padding: 24px 28px 12px 28px;
            }
            .search-bar {
                padding: 12px 28px;
            }
            .search-bar input {
                width: 340px;
            }
            td, th {
                padding: 14px 12px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>
        📋 Rekapan Kehadiran Semester 2
    </h1>

    <!-- indikator untuk HP: beri tahu bisa digeser -->
    <div class="swipe-indicator">
        <span>👉</span> Geser tabel ke kanan/kiri untuk lihat Sakit, Izin, Alpa <span>👈</span>
    </div>

    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="🔍 Cari nama siswa ..." aria-label="Cari nama siswa">
    </div>

    <!-- HANYA AREA INI YANG BISA DISCROLL -->
    <div class="table-wrapper" id="tableWrapper">
        <table id="attendanceTable">
            <thead>
                <tr>
                    <th>No</th>
                    <th>Nama Siswa/i</th>
                    <th>Sakit</th>
                    <th>Izin</th>
                    <th>Alpa</th>
                </tr>
                </thead>
                <tbody id="tableBody">
                    <!-- data via javascript -->
                </tbody>
        </table>
    </div>
    <div class="bottom-note">
        ↕️ Geser vertikal • Klik nama untuk memberi tanda
    </div>
</div>

<script>
    // Data (Sakit diambil dari kolom Sekat sebelumnya)
    const studentsData = [
        { no:1, nama:"ALDRIAN RONALSON TITIHERU", sakit:0, izin:2, alpa:0 },
        { no:2, nama:"Alfian Adi Purnomo", sakit:0, izin:0, alpa:3 },

        { no:5, nama:"Cici Deswita Febriani", sakit:4, izin:0, alpa:6 },
        { no:6, nama:"CINTA LAURA HURULEA", sakit:0, izin:0, alpa:1 },
        { no:7, nama:"DANIYATI", sakit:1, izin:0, alpa:0 },
        { no:8, nama:"Deby Debora Kemesrar", sakit:0, izin:0, alpa:14 },
        { no:9, nama:"DELVERO EDWADT KALAMI", sakit:2, izin:0, alpa:7 },
        { no:10, nama:"ELDA W. KAMESFLE", sakit:0, izin:0, alpa:6 },
        { no:11, nama:"FALEN PRATAMA AYGE", sakit:2, izin:1, alpa:0 },
        { no:12, nama:"Falensia Marissa Runtu", sakit:0, izin:0, alpa:0 },
        { no:13, nama:"HARRY PANCA POLSIARY", sakit:0, izin:1, alpa:0 },
        { no:14, nama:"Herman Gabriel Fonataba", sakit:0, izin:1, alpa:0 },
        { no:15, nama:"Jessie Melissa Cantika Latue", sakit:1, izin:0, alpa:4 },
        { no:16, nama:"JUEN FRIDA LEKAHENA", sakit:0, izin:0, alpa:1 },
        { no:17, nama:"JUNIOR PASKAL TAHITU", sakit:1, izin:0, alpa:3 },
        { no:18, nama:"KIKI KHUSNUL OKTAVIANTI", sakit:0, izin:2, alpa:2 },
        { no:19, nama:"MARIA F. LEWATAKA", sakit:2, izin:0, alpa:0 },
        { no:20, nama:"MARIA MAGDALENA SNANFI", sakit:0, izin:0, alpa:11 },
        { no:21, nama:"Maya Rosaida Paa", sakit:3, izin:0, alpa:3 },
        { no:22, nama:"MELANI STEFANNY LOIWATU", sakit:1, izin:0, alpa:0 },

        { no:25, nama:"NATHALIA RUMBINO", sakit:3, izin:1, alpa:5 },
        { no:26, nama:"Novela Jessica Ta'bilangi", sakit:1, izin:2, alpa:1 },
        { no:27, nama:"OLGA LIKLIKWATIL", sakit:1, izin:1, alpa:2 },
        { no:28, nama:"RACHEL MANUELLA MAYOR", sakit:0, izin:0, alpa:4 },
        { no:29, nama:"Raimond E. Soselisa", sakit:3, izin:0, alpa:11 },
        { no:30, nama:"RATNA SARI ABDULMUIN", sakit:1, izin:0, alpa:4 },
        { no:31, nama:"Rizky", sakit:0, izin:0, alpa:4 },
        { no:32, nama:"SAMUEL.FANIK.TEHUPEIORY", sakit:0, izin:0, alpa:6 },
        { no:33, nama:"Tiara Arung Silambi", sakit:0, izin:0, alpa:1 },
        { no:34, nama:"WULAN RAHMADANI", sakit:1, izin:1, alpa:1 },
        { no:35, nama:"ZAINU", sakit:0, izin:1, alpa:5 }
    ];

    const tbody = document.getElementById('tableBody');
    const searchInput = document.getElementById('searchInput');
    let currentSelectedRow = null;

    function clearHighlight() {
        if (currentSelectedRow) {
            currentSelectedRow.classList.remove('row-selected');
            currentSelectedRow = null;
        }
        const allRows = document.querySelectorAll('#attendanceTable tbody tr');
        allRows.forEach(row => row.classList.remove('row-selected'));
        currentSelectedRow = null;
    }

    function highlightRow(rowElement) {
        clearHighlight();
        if (rowElement) {
            rowElement.classList.add('row-selected');
            currentSelectedRow = rowElement;
        }
    }

    function attachRowClickHandler() {
        const table = document.getElementById('attendanceTable');
        if (!table) return;
        table.removeEventListener('click', tableClickHandler);
        table.addEventListener('click', tableClickHandler);
    }

    function tableClickHandler(event) {
        let target = event.target;
        let targetCell = null;
        while (target && target !== this) {
            if (target.tagName === 'TD') {
                targetCell = target;
                break;
            }
            target = target.parentElement;
        }
        if (!targetCell) return;
        const cellIndex = targetCell.cellIndex;
        if (cellIndex === 1) {
            const row = targetCell.parentElement;
            highlightRow(row);
        }
    }

    function renderTable(filteredArray = null) {
        if (!tbody) return;
        const dataSource = filteredArray !== null ? filteredArray : studentsData;
        tbody.innerHTML = '';
        
        for (let i = 0; i < dataSource.length; i++) {
            const s = dataSource[i];
            const row = tbody.insertRow();
            
            const cellNo = row.insertCell(0);
            cellNo.textContent = s.no;
            cellNo.style.fontWeight = '500';
            
            const cellName = row.insertCell(1);
            cellName.textContent = s.nama;
            
            const cellSakit = row.insertCell(2);
            cellSakit.innerHTML = `<span class="number-cell sakit">${s.sakit}</span>`;
            
            const cellIzin = row.insertCell(3);
            cellIzin.innerHTML = `<span class="number-cell izin">${s.izin}</span>`;
            
            const cellAlpa = row.insertCell(4);
            cellAlpa.innerHTML = `<span class="number-cell alpa">${s.alpa}</span>`;
        }
        
        currentSelectedRow = null;
        attachRowClickHandler();
    }

    function handleFilter() {
        const keyword = searchInput.value.trim().toLowerCase();
        if (keyword === "") {
            renderTable();
        } else {
            const filtered = studentsData.filter(s => s.nama.toLowerCase().includes(keyword));
            renderTable(filtered);
        }
        clearHighlight();
    }

    if (searchInput) {
        searchInput.addEventListener('input', handleFilter);
        searchInput.addEventListener('search', handleFilter);
    }

    renderTable();
</script>
</body>
</html>
