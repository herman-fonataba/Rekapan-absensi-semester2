<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Rekapan Kehadiran Semester 2 | Sakit · Izin · Alpa</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ----- GLOBAL: body tidak ikut scroll (hanya tabel yang scroll) ----- */
        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', 'Noto Sans', sans-serif;
            background: #eef2f7;
            padding: 12px;
            display: flex;
            flex-direction: column;
        }

        /* container utama */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 28px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }

        /* HEADER - selalu tetap di atas */
        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            padding: 20px 24px 12px 24px;
            background: white;
            border-bottom: 1px solid #e9edf2;
            flex-shrink: 0;
        }

        /* search bar */
        .search-bar {
            padding: 12px 24px;
            background: white;
            border-bottom: 1px solid #eef2f6;
            flex-shrink: 0;
        }

        .search-bar input {
            width: 100%;
            max-width: 360px;
            padding: 10px 18px;
            font-size: 0.9rem;
            border: 1px solid #cbdde6;
            border-radius: 44px;
            background: white;
            transition: 0.2s;
            outline: none;
            font-family: inherit;
        }

        .search-bar input:focus {
            border-color: #2c7da0;
            box-shadow: 0 0 0 3px rgba(44, 125, 160, 0.1);
        }

        /* indikator geser HANYA muncul di HP (media query) */
        .swipe-hint {
            display: none;
            text-align: center;
            font-size: 0.7rem;
            background: #fffbee;
            color: #b45f06;
            padding: 6px 12px;
            border-bottom: 1px solid #ffe0b3;
            flex-shrink: 0;
            gap: 8px;
            justify-content: center;
            align-items: center;
        }

        /* WRAPPER TABEL: satu-satunya area yang bisa scroll (vertical & horizontal) */
        .table-wrapper {
            flex: 1;
            overflow: auto;
            -webkit-overflow-scrolling: touch;
            background: white;
            scroll-behavior: smooth;
        }

        /* TABEL */
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            /* minimal width agar di HP tetap bisa digeser horizontal */
            min-width: 600px;
        }

        /* sticky header */
        thead th {
            position: sticky;
            top: 0;
            background: #f2f6fc;
            color: #1a4d6b;
            font-weight: 700;
            padding: 14px 10px;
            text-align: center;
            border-bottom: 2px solid #d4e2ec;
            z-index: 12;
            white-space: nowrap;
        }

        td {
            padding: 12px 10px;
            border-bottom: 1px solid #ecf3f8;
            text-align: center;
            vertical-align: middle;
            transition: background 0.15s ease;
        }

        /* kolom NAMA: rata kiri, bisa diklik */
        td:nth-child(2) {
            text-align: left;
            font-weight: 500;
            color: #0f3b5c;
            cursor: pointer;
            word-break: break-word;
            white-space: normal;
        }

        td:nth-child(2):hover {
            background-color: #eaf3fc;
            text-decoration: underline;
        }

        /* highlight baris yang dipilih (klik nama) */
        .row-selected td {
            background-color: #fff2db !important;
            border-left: 3px solid #f5a623;
            border-right: 3px solid #f5a623;
        }

        .row-selected td:nth-child(2) {
            background-color: #ffe6b3 !important;
            font-weight: 700;
        }

        /* gaya angka Sakit, Izin, Alpa */
        .number-cell {
            font-family: 'SF Mono', 'Courier New', monospace;
            font-weight: 700;
            font-size: 0.9rem;
            display: inline-block;
            min-width: 36px;
            padding: 2px 6px;
            border-radius: 24px;
        }
        .sakit {
            color: #1f6e1f;
            background-color: #e9f7e9;
        }
        .izin {
            color: #c45c0c;
            background-color: #fff0e0;
        }
        .alpa {
            color: #bc2c2c;
            background-color: #ffe6e6;
        }

        /* footer small */
        .bottom-note {
            text-align: center;
            font-size: 0.7rem;
            color: #6f8eaa;
            padding: 10px 16px;
            border-top: 1px solid #eef2f6;
            background: #ffffff;
            flex-shrink: 0;
        }

        /* ============================================= */
        /* RESPONSIVE: HP (max-width: 700px) */
        /* ============================================= */
        @media (max-width: 700px) {
            body {
                padding: 6px;
            }
            h1 {
                font-size: 1.2rem;
                padding: 14px 16px 8px 16px;
            }
            .search-bar {
                padding: 8px 12px;
            }
            .search-bar input {
                font-size: 0.85rem;
                padding: 8px 14px;
                max-width: 100%;
            }
            /* tampilkan hint geser (hanya di hp) */
            .swipe-hint {
                display: flex;
            }
            thead th {
                padding: 8px 6px;
                font-size: 0.7rem;
            }
            td {
                padding: 8px 5px;
                font-size: 0.72rem;
            }
            td:nth-child(2) {
                min-width: 130px;
                font-size: 0.74rem;
            }
            .number-cell {
                font-size: 0.78rem;
                min-width: 28px;
                padding: 2px 4px;
            }
            .bottom-note {
                font-size: 0.6rem;
                padding: 6px 8px;
            }
        }

        /* LAPTOP / KOMPUTER: tampilan lebih lega, tanpa hint geser */
        @media (min-width: 701px) {
            .table-wrapper {
                overflow: auto; /* tetap bisa geser jika diperlukan, tapi karena tabel lebar otomatis jarang perlu */
            }
            table {
                min-width: auto; /* tidak dipaksa minimal width, biar mengikuti konten */
            }
            td, th {
                padding: 14px 14px;
            }
            h1 {
                font-size: 1.9rem;
                padding: 24px 32px 12px 32px;
            }
            .search-bar {
                padding: 12px 32px;
            }
            .search-bar input {
                width: 320px;
            }
            .bottom-note {
                padding: 12px 24px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>
        📋 Rekapan Kehadiran Semester 2
    </h1>

    <!-- hint khusus HP: memberi tahu user bisa geser -->
    <div class="swipe-hint">
        👉 Geser tabel ke kanan/kiri untuk melihat Sakit · Izin · Alpa 👈
    </div>

    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="🔍 Cari nama siswa (ketik nama ...)" aria-label="Cari siswa">
    </div>

    <!-- HANYA AREA TABEL YANG BISA DISCROLL (baik di HP maupun laptop) -->
    <div class="table-wrapper" id="tableWrapper">
        <table id="attendanceTable">
            <thead>
                <tr>
                    <th>No</th>
                    <th>Nama Siswa/i</th>
                    <th>Sakit</th>
                    <th>Izin</th>
                    <th>Alpa</th>
                </tr>
                </thead>
                <tbody id="tableBody">
                    <!-- isi via JS -->
                </tbody>
        </table>
    </div>
    <div class="bottom-note">
        ⚡ Klik nama siswa untuk memberi tanda warna • Geser bebas (vertikal/horizontal)
    </div>
</div>

<script>
    // Data dari excel (sekat diganti menjadi sakit)

        { no:10, nama:"ELDA W. KAMESFLE", sakit:0, izin:0, alpa:6 },
        { no:11, nama:"FALEN PRATAMA AYGE", sakit:2, izin:1, alpa:0 },
        { no:12, nama:"Falensia Marissa Runtu", sakit:0, izin:0, alpa:0 },

        { no:14, nama:"Herman Gabriel Fonataba", sakit:0, izin:1, alpa:0 },
        { no:15, nama:"Jessie Melissa Cantika Latue", sakit:1, izin:0, alpa:4 },
        { no:16, nama:"JUEN FRIDA LEKAHENA", sakit:0, izin:0, alpa:1 },
        { no:17, nama:"JUNIOR PASKAL TAHITU", sakit:1, izin:0, alpa:3 },
        { no:18, nama:"KIKI KHUSNUL OKTAVIANTI", sakit:0, izin:2, alpa:2 },
        { no:19, nama:"MARIA F. LEWATAKA", sakit:2, izin:0, alpa:0 },
        { no:20, nama:"MARIA MAGDALENA SNANFI", sakit:0, izin:0, alpa:11 },
        { no:21, nama:"Maya Rosaida Paa", sakit:3, izin:0, alpa:3 },

        { no:26, nama:"Novela Jessica Ta'bilangi", sakit:1, izin:2, alpa:1 },
        { no:27, nama:"OLGA LIKLIKWATIL", sakit:1, izin:1, alpa:2 },
        { no:28, nama:"RACHEL MANUELLA MAYOR", sakit:0, izin:0, alpa:4 },
        { no:29, nama:"Raimond E. Soselisa", sakit:3, izin:0, alpa:11 },
        { no:30, nama:"RATNA SARI ABDULMUIN", sakit:1, izin:0, alpa:4 },
        { no:31, nama:"Rizky", sakit:0, izin:0, alpa:4 },
        { no:32, nama:"SAMUEL.FANIK.TEHUPEIORY", sakit:0, izin:0, alpa:6 },
        { no:33, nama:"Tiara Arung Silambi", sakit:0, izin:0, alpa:1 },
        { no:34, nama:"WULAN RAHMADANI", sakit:1, izin:1, alpa:1 },
        { no:35, nama:"ZAINU", sakit:0, izin:1, alpa:5 }
    ];

    const tbody = document.getElementById('tableBody');
    const searchInput = document.getElementById('searchInput');
    let currentSelectedRow = null;

    function clearHighlight() {
        if (currentSelectedRow) {
            currentSelectedRow.classList.remove('row-selected');
            currentSelectedRow = null;
        }
        const allRows = document.querySelectorAll('#attendanceTable tbody tr');
        allRows.forEach(row => row.classList.remove('row-selected'));
        currentSelectedRow = null;
    }

    function highlightRow(rowElement) {
        clearHighlight();
        if (rowElement) {
            rowElement.classList.add('row-selected');
            currentSelectedRow = rowElement;
        }
    }

    function handleRowClick(event) {
        let target = event.target;
        let targetCell = null;
        while (target && target !== event.currentTarget) {
            if (target.tagName === 'TD') {
                targetCell = target;
                break;
            }
            target = target.parentElement;
        }
        if (!targetCell) return;
        if (targetCell.cellIndex === 1) { // kolom NAMA (index 1)
            const row = targetCell.parentElement;
            highlightRow(row);
        }
    }

    function attachTableEvents() {
        const table = document.getElementById('attendanceTable');
        if (table) {
            table.removeEventListener('click', handleRowClick);
            table.addEventListener('click', handleRowClick);
        }
    }

    function renderTable(filteredArray = null) {
        if (!tbody) return;
        const dataSource = filteredArray !== null ? filteredArray : studentsData;
        tbody.innerHTML = '';

        for (let i = 0; i < dataSource.length; i++) {
            const s = dataSource[i];
            const row = tbody.insertRow();

            const cellNo = row.insertCell(0);
            cellNo.textContent = s.no;
            cellNo.style.fontWeight = '500';

            const cellName = row.insertCell(1);
            cellName.textContent = s.nama;

            const cellSakit = row.insertCell(2);
            cellSakit.innerHTML = `<span class="number-cell sakit">${s.sakit}</span>`;

            const cellIzin = row.insertCell(3);
            cellIzin.innerHTML = `<span class="number-cell izin">${s.izin}</span>`;

            const cellAlpa = row.insertCell(4);
            cellAlpa.innerHTML = `<span class="number-cell alpa">${s.alpa}</span>`;
        }

        // reset highlight setelah render
        currentSelectedRow = null;
        attachTableEvents();
    }

    function filterTable() {
        const keyword = searchInput.value.trim().toLowerCase();
        if (keyword === "") {
            renderTable();
        } else {
            const filtered = studentsData.filter(s => s.nama.toLowerCase().includes(keyword));
            renderTable(filtered);
        }
        clearHighlight();
    }

    searchInput.addEventListener('input', filterTable);
    searchInput.addEventListener('search', filterTable);

    renderTable();
</script>
</body>
</html>
