<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Rekapan Kehadiran Semester 2 - Sakit, Izin, Alpa</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', 'Noto Sans', sans-serif;
            background: #eef2f7;
            margin: 0;
            padding: 16px 12px;
            color: #1a2c3e;
            min-height: 100vh;
        }

        /* container utama */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 28px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* HEADER */
        h1 {
            font-size: 1.6rem;
            font-weight: 700;
            padding: 20px 20px 12px 20px;
            margin: 0;
            background: white;
            border-bottom: 1px solid #e9edf2;
            letter-spacing: -0.2px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        /* search bar - mobile friendly */
        .search-bar {
            padding: 12px 16px;
            background: white;
            border-bottom: 1px solid #eef2f6;
        }

        .search-bar input {
            width: 100%;
            padding: 12px 16px;
            font-size: 1rem;
            border: 1px solid #cddfe8;
            border-radius: 44px;
            background: #ffffff;
            transition: 0.2s;
            outline: none;
            font-family: inherit;
        }

        .search-bar input:focus {
            border-color: #2c7da0;
            box-shadow: 0 0 0 3px rgba(44, 125, 160, 0.1);
        }

        /* wrapper scroll - baik untuk HP maupun desktop */
        .table-wrapper {
            overflow-x: auto;
            overflow-y: auto;
            max-height: 65vh;
            -webkit-overflow-scrolling: touch;
            border-bottom-left-radius: 24px;
            border-bottom-right-radius: 24px;
        }

        /* Tabel utama */
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            min-width: 600px;
        }

        /* Sticky header - ikut scroll vertikal */
        thead th {
            position: sticky;
            top: 0;
            background: #f2f6fc;
            color: #1a4d6b;
            font-weight: 700;
            padding: 14px 8px;
            font-size: 0.85rem;
            text-align: center;
            border-bottom: 2px solid #dce5ec;
            z-index: 12;
            white-space: nowrap;
        }

        td {
            padding: 12px 8px;
            border-bottom: 1px solid #ecf3f8;
            text-align: center;
            vertical-align: middle;
            font-size: 0.85rem;
        }

        /* Kolom NAMA rata kiri + tebal sedang */
        td:nth-child(2) {
            text-align: left;
            font-weight: 500;
            color: #0f3b5c;
            background-color: #fefefe;
            word-break: break-word;
            white-space: normal;
            min-width: 160px;
        }

        /* Nomor kolom pertama */
        td:first-child, th:first-child {
            padding-left: 12px;
            text-align: center;
            font-weight: 500;
            white-space: nowrap;
        }

        /* Warna angka */
        .number-cell {
            font-family: 'SF Mono', 'Courier New', monospace;
            font-weight: 700;
            font-size: 0.9rem;
        }
        .sakit { color: #2b6e2b; }
        .izin { color: #e68a2e; font-weight: 700; }
        .alpa { color: #c72a2a; font-weight: 700; }

        /* Hover row */
        tr:hover td {
            background-color: #fafdff;
        }

        /* footer kosong supaya rapi */
        .bottom-note {
            text-align: center;
            font-size: 0.7rem;
            color: #8ba3bc;
            padding: 16px 12px;
            border-top: 1px solid #eef2f6;
            background: #ffffff;
        }

        /* ========== RESPONSIVE EXTRA UNTUK HP ========== */
        @media (max-width: 640px) {
            body {
                padding: 12px 8px;
            }
            h1 {
                font-size: 1.35rem;
                padding: 16px 16px 8px 16px;
            }
            .search-bar {
                padding: 10px 12px;
            }
            .search-bar input {
                padding: 10px 14px;
                font-size: 0.9rem;
            }
            .table-wrapper {
                max-height: 70vh;
            }
            thead th {
                padding: 10px 5px;
                font-size: 0.75rem;
            }
            td {
                padding: 10px 5px;
                font-size: 0.78rem;
            }
            td:nth-child(2) {
                min-width: 130px;
                font-size: 0.78rem;
            }
            .number-cell {
                font-size: 0.82rem;
            }
        }

        /* Laptop & desktop lebih lega */
        @media (min-width: 1024px) {
            .container {
                margin: 20px auto;
            }
            h1 {
                font-size: 1.9rem;
                padding: 28px 28px 12px 28px;
            }
            .search-bar {
                padding: 16px 28px;
            }
            .search-bar input {
                width: 320px;
                font-size: 0.9rem;
            }
            td, th {
                padding: 14px 12px;
            }
            td:nth-child(2) {
                font-size: 0.9rem;
            }
        }

        /* sentuhan modern */
        .emoji-icon {
            font-size: 1.2rem;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>
        📋 Rekapan Kehadiran Semester 2
    </h1>

    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="🔍 Cari nama siswa ..." aria-label="Cari nama siswa">
    </div>

    <div class="table-wrapper">
        <table id="attendanceTable">
            <thead>
                <tr>
                    <th>No</th>
                    <th>Nama Siswa/i</th>
                    <th>Sakit</th>
                    <th>Izin</th>
                    <th>Alpa</th>
                </tr>
                </thead>
                <tbody id="tableBody">
                    <!-- data via javascript -->
                </tbody>
        </table>
    </div>
    <div class="bottom-note">
        ⏳ Tabel dapat digeser horizontal • Data sesuai semester 2
    </div>
</div>

<script>
    // Data asli dari file excel — kolom Sakit menggantikan "Sekat"

        { no:30, nama:"RATNA SARI ABDULMUIN", sakit:1, izin:0, alpa:4 },
        { no:31, nama:"Rizky", sakit:0, izin:0, alpa:4 },
        { no:32, nama:"SAMUEL.FANIK.TEHUPEIORY", sakit:0, izin:0, alpa:6 },
        { no:33, nama:"Tiara Arung Silambi", sakit:0, izin:0, alpa:1 },
        { no:34, nama:"WULAN RAHMADANI", sakit:1, izin:1, alpa:1 },
        { no:35, nama:"ZAINU", sakit:0, izin:1, alpa:5 }
    ];

    const tbody = document.getElementById('tableBody');
    const searchInput = document.getElementById('searchInput');

    // Fungsi render tabel (dengan filter)
    function renderTable(filteredArray = null) {
        if (!tbody) return;
        const dataSource = filteredArray !== null ? filteredArray : studentsData;
        tbody.innerHTML = '';
        
        for (let i = 0; i < dataSource.length; i++) {
            const s = dataSource[i];
            const row = tbody.insertRow();
            
            // No
            const cellNo = row.insertCell(0);
            cellNo.textContent = s.no;
            cellNo.style.fontWeight = '500';
            
            // Nama
            const cellName = row.insertCell(1);
            cellName.textContent = s.nama;
            
            // Sakit
            const cellSakit = row.insertCell(2);
            cellSakit.textContent = s.sakit;
            cellSakit.className = 'number-cell sakit';
            
            // Izin
            const cellIzin = row.insertCell(3);
            cellIzin.textContent = s.izin;
            cellIzin.className = 'number-cell izin';
            
            // Alpa
            const cellAlpa = row.insertCell(4);
            cellAlpa.textContent = s.alpa;
            cellAlpa.className = 'number-cell alpa';
        }
    }

    // Filter interaktif (nama saja)
    function handleFilter() {
        const keyword = searchInput.value.trim().toLowerCase();
        if (keyword === "") {
            renderTable();
            return;
        }
        const filtered = studentsData.filter(s => s.nama.toLowerCase().includes(keyword));
        renderTable(filtered);
    }

    // Event listener untuk pencarian (real-time)
    if (searchInput) {
        searchInput.addEventListener('input', handleFilter);
        searchInput.addEventListener('search', handleFilter);
    }

    // Render awal
    renderTable();
</script>
</body>
</html>
