<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Rekapan Kehadiran Semester 2 - Sakit, Izin, Alpa</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* Body TIDAK BISA SCROLL, hanya tabel yang scroll */
        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', 'Noto Sans', sans-serif;
            background: #eef2f7;
            color: #1a2c3e;
            display: flex;
            flex-direction: column;
            padding: 12px;
        }

        /* container utama memenuhi area */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 28px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }

        /* HEADER — tetap di atas */
        h1 {
            font-size: 1.6rem;
            font-weight: 700;
            padding: 20px 20px 12px 20px;
            margin: 0;
            background: white;
            border-bottom: 1px solid #e9edf2;
            flex-shrink: 0;
        }

        /* search bar — tetap di atas */
        .search-bar {
            padding: 12px 16px;
            background: white;
            border-bottom: 1px solid #eef2f6;
            flex-shrink: 0;
        }

        .search-bar input {
            width: 100%;
            padding: 12px 16px;
            font-size: 1rem;
            border: 1px solid #cddfe8;
            border-radius: 44px;
            background: #ffffff;
            transition: 0.2s;
            outline: none;
            font-family: inherit;
        }

        .search-bar input:focus {
            border-color: #2c7da0;
            box-shadow: 0 0 0 3px rgba(44, 125, 160, 0.1);
        }

        /* HANYA TABEL WRAPPER YANG BISA SCROLL (VERTIKAL & HORIZONTAL) */
        .table-wrapper {
            flex: 1;
            overflow: auto;
            -webkit-overflow-scrolling: touch;
            border-bottom-left-radius: 24px;
            border-bottom-right-radius: 24px;
            background: white;
            scroll-behavior: smooth;
        }

        /* TABEL */
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            min-width: 600px;
        }

        /* Sticky header - saat scroll vertikal, header tetap terlihat */
        thead th {
            position: sticky;
            top: 0;
            background: #f2f6fc;
            color: #1a4d6b;
            font-weight: 700;
            padding: 14px 8px;
            font-size: 0.85rem;
            text-align: center;
            border-bottom: 2px solid #dce5ec;
            z-index: 12;
            white-space: nowrap;
        }

        td {
            padding: 12px 8px;
            border-bottom: 1px solid #ecf3f8;
            text-align: center;
            vertical-align: middle;
            font-size: 0.85rem;
            transition: background-color 0.2s ease;
        }

        /* Kolom NAMA rata kiri */
        td:nth-child(2) {
            text-align: left;
            font-weight: 500;
            color: #0f3b5c;
            background-color: #fefefe;
            word-break: break-word;
            white-space: normal;
            min-width: 160px;
            cursor: pointer;
            position: relative;
        }

        /* Efek hover pada nama untuk memberi petunjuk bisa diklik */
        td:nth-child(2):hover {
            background-color: #e6f0fa !important;
            text-decoration: underline;
            text-underline-offset: 2px;
        }

        /* kelas untuk baris yang sedang dipilih (klik nama) */
        .row-selected td {
            background-color: #fff2db !important;
            border-left: 3px solid #f5a623;
            border-right: 3px solid #f5a623;
        }

        .row-selected td:nth-child(2) {
            background-color: #ffe6b3 !important;
            font-weight: 700;
        }

        td:first-child, th:first-child {
            padding-left: 12px;
            padding-right: 8px;
            text-align: center;
            font-weight: 500;
            white-space: nowrap;
        }

        /* Gaya angka */
        .number-cell {
            font-family: 'SF Mono', 'Courier New', monospace;
            font-weight: 700;
            font-size: 0.9rem;
        }
        .sakit { color: #2b6e2b; }
        .izin { color: #e68a2e; font-weight: 700; }
        .alpa { color: #c72a2a; font-weight: 700; }

        /* Hover baris biasa */
        tr:hover td {
            background-color: #fafdff;
        }

        /* footer kecil */
        .bottom-note {
            text-align: center;
            font-size: 0.7rem;
            color: #8ba3bc;
            padding: 10px 12px;
            border-top: 1px solid #eef2f6;
            background: #ffffff;
            flex-shrink: 0;
        }

        /* ====== RESPONSIVE HP ====== */
        @media (max-width: 640px) {
            body {
                padding: 8px;
            }
            h1 {
                font-size: 1.35rem;
                padding: 14px 16px 8px 16px;
            }
            .search-bar {
                padding: 8px 12px;
            }
            .search-bar input {
                padding: 10px 14px;
                font-size: 0.9rem;
            }
            thead th {
                padding: 10px 5px;
                font-size: 0.75rem;
            }
            td {
                padding: 10px 5px;
                font-size: 0.78rem;
            }
            td:nth-child(2) {
                min-width: 130px;
            }
            .number-cell {
                font-size: 0.82rem;
            }
        }

        @media (min-width: 1024px) {
            .container {
                margin: 16px auto;
            }
            h1 {
                font-size: 1.9rem;
                padding: 24px 28px 12px 28px;
            }
            .search-bar {
                padding: 12px 28px;
            }
            .search-bar input {
                width: 340px;
                font-size: 0.9rem;
            }
            td, th {
                padding: 14px 12px;
            }
        }

        /* Hilangkan outline berlebih */
        :focus {
            outline: none;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>
        📋 Rekapan Kehadiran Semester 2
    </h1>

    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="🔍 Cari nama siswa ..." aria-label="Cari nama siswa">
    </div>

    <!-- HANYA AREA INI YANG BISA DISCROLL (VERTIKAL & HORIZONTAL) -->
    <div class="table-wrapper" id="tableWrapper">
        <table id="attendanceTable">
            <thead>
                <tr>
                    <th>No</th>
                    <th>Nama Siswa/i</th>
                    <th>Sakit</th>
                    <th>Izin</th>
                    <th>Alpa</th>
                </tr>
                </thead>
                <tbody id="tableBody">
                    <!-- data via javascript -->
                </tbody>
        </table>
    </div>
    <div class="bottom-note">
        ↕️ Geser tabel (horizontal/vertikal) • Klik nama siswa untuk memberi tanda warna
    </div>
</div>

<script>
    // Data dari file excel (kolom Sakit = sebelumnya Sekat)
    const studentsData = [
        { no:1, nama:"ALDRIAN RONALSON TITIHERU", sakit:0, izin:2, alpa:0 },
        { no:2, nama:"Alfian Adi Purnomo", sakit:0, izin:0, alpa:3 },

        { no:4, nama:"Bryan Edward Julyanto Bukari", sakit:1, izin:0, alpa:6 },
        { no:5, nama:"Cici Deswita Febriani", sakit:4, izin:0, alpa:6 },
        { no:6, nama:"CINTA LAURA HURULEA", sakit:0, izin:0, alpa:1 },
        { no:7, nama:"DANIYATI", sakit:1, izin:0, alpa:0 },
        { no:8, nama:"Deby Debora Kemesrar", sakit:0, izin:0, alpa:14 },
        { no:9, nama:"DELVERO EDWADT KALAMI", sakit:2, izin:0, alpa:7 },
        { no:10, nama:"ELDA W. KAMESFLE", sakit:0, izin:0, alpa:6 },
        { no:11, nama:"FALEN PRATAMA AYGE", sakit:2, izin:1, alpa:0 },
        { no:12, nama:"Falensia Marissa Runtu", sakit:0, izin:0, alpa:0 },
        { no:13, nama:"HARRY PANCA POLSIARY", sakit:0, izin:1, alpa:0 },
        { no:14, nama:"Herman Gabriel Fonataba", sakit:0, izin:1, alpa:0 },
        { no:15, nama:"Jessie Melissa Cantika Latue", sakit:1, izin:0, alpa:4 },
        { no:16, nama:"JUEN FRIDA LEKAHENA", sakit:0, izin:0, alpa:1 },
        { no:17, nama:"JUNIOR PASKAL TAHITU", sakit:1, izin:0, alpa:3 },
        { no:18, nama:"KIKI KHUSNUL OKTAVIANTI", sakit:0, izin:2, alpa:2 },
        { no:19, nama:"MARIA F. LEWATAKA", sakit:2, izin:0, alpa:0 },
        { no:20, nama:"MARIA MAGDALENA SNANFI", sakit:0, izin:0, alpa:11 },
        { no:21, nama:"Maya Rosaida Paa", sakit:3, izin:0, alpa:3 },
        { no:22, nama:"MELANI STEFANNY LOIWATU", sakit:1, izin:0, alpa:0 },
        { no:23, nama:"MUHAMMAD FADLAN", sakit:0, izin:0, alpa:4 },
        { no:24, nama:"NAOMI TRESIA PAITEI", sakit:0, izin:0, alpa:1 },
        { no:25, nama:"NATHALIA RUMBINO", sakit:3, izin:1, alpa:5 },
        { no:26, nama:"Novela Jessica Ta'bilangi", sakit:1, izin:2, alpa:1 },
        { no:27, nama:"OLGA LIKLIKWATIL", sakit:1, izin:1, alpa:2 },
        { no:28, nama:"RACHEL MANUELLA MAYOR", sakit:0, izin:0, alpa:4 },
        { no:29, nama:"Raimond E. Soselisa", sakit:3, izin:0, alpa:11 },
        { no:30, nama:"RATNA SARI ABDULMUIN", sakit:1, izin:0, alpa:4 },
        { no:31, nama:"Rizky", sakit:0, izin:0, alpa:4 },
        { no:32, nama:"SAMUEL.FANIK.TEHUPEIORY", sakit:0, izin:0, alpa:6 },
        { no:33, nama:"Tiara Arung Silambi", sakit:0, izin:0, alpa:1 },
        { no:34, nama:"WULAN RAHMADANI", sakit:1, izin:1, alpa:1 },
        { no:35, nama:"ZAINU", sakit:0, izin:1, alpa:5 }
    ];

    const tbody = document.getElementById('tableBody');
    const searchInput = document.getElementById('searchInput');
    let currentSelectedRow = null;  // menyimpan baris yang sedang dipilih

    // Fungsi untuk menghapus highlight dari semua baris
    function clearHighlight() {
        if (currentSelectedRow) {
            currentSelectedRow.classList.remove('row-selected');
            currentSelectedRow = null;
        }
        // alternatif: hapus class dari semua baris jika ada (tapi lebih aman pakai variabel)
        const allRows = document.querySelectorAll('#attendanceTable tbody tr');
        allRows.forEach(row => {
            row.classList.remove('row-selected');
        });
        currentSelectedRow = null;
    }

    // Fungsi untuk memberi highlight pada baris tertentu
    function highlightRow(rowElement) {
        clearHighlight();          // hapus highlight sebelumnya
        if (rowElement) {
            rowElement.classList.add('row-selected');
            currentSelectedRow = rowElement;
        }
    }

    // Event listener untuk klik pada kolom NAMA (kolom ke-2 index 1)
    // Menggunakan event delegation karena baris bisa berubah (filter/search)
    function attachRowClickHandler() {
        const table = document.getElementById('attendanceTable');
        if (!table) return;
        
        // Hapus listener lama jika ada, pasang baru (pakai event delegation)
        table.removeEventListener('click', tableClickHandler);
        table.addEventListener('click', tableClickHandler);
    }

    function tableClickHandler(event) {
        // Cari elemen td yang diklik, pastikan itu kolom NAMA (kolom ke-2 / index 1)
        let target = event.target;
        let targetCell = null;
        
        // Cari apakah yang diklik adalah td atau turunannya
        while (target && target !== this) {
            if (target.tagName === 'TD') {
                targetCell = target;
                break;
            }
            target = target.parentElement;
        }
        
        if (!targetCell) return;
        
        // Ambil indeks kolom dari cell yang diklik
        const cellIndex = targetCell.cellIndex; // 0: No, 1: Nama, 2: Sakit, 3: Izin, 4: Alpa
        if (cellIndex === 1) {  // Hanya jika yang diklik adalah kolom NAMA
            const row = targetCell.parentElement; // <tr>
            highlightRow(row);
        }
    }

    // Render tabel (dengan atau tanpa filter)
    function renderTable(filteredArray = null) {
        if (!tbody) return;
        const dataSource = filteredArray !== null ? filteredArray : studentsData;
        tbody.innerHTML = '';
        
        for (let i = 0; i < dataSource.length; i++) {
            const s = dataSource[i];
            const row = tbody.insertRow();
            
            // No
            const cellNo = row.insertCell(0);
            cellNo.textContent = s.no;
            cellNo.style.fontWeight = '500';
            
            // Nama
            const cellName = row.insertCell(1);
            cellName.textContent = s.nama;
            
            // Sakit
            const cellSakit = row.insertCell(2);
            cellSakit.textContent = s.sakit;
            cellSakit.className = 'number-cell sakit';
            
            // Izin
            const cellIzin = row.insertCell(3);
            cellIzin.textContent = s.izin;
            cellIzin.className = 'number-cell izin';
            
            // Alpa
            const cellAlpa = row.insertCell(4);
            cellAlpa.textContent = s.alpa;
            cellAlpa.className = 'number-cell alpa';
        }
        
        // Setelah render ulang, highlight harus di-reset (karena DOM baru)
        currentSelectedRow = null;
        // Pasang ulang event listener (meskipun sudah terpasang, pastikan tetap bekerja)
        attachRowClickHandler();
    }

    // Filter nama (dengan mempertahankan perilaku)
    function handleFilter() {
        const keyword = searchInput.value.trim().toLowerCase();
        if (keyword === "") {
            renderTable();
            return;
        }
        const filtered = studentsData.filter(s => s.nama.toLowerCase().includes(keyword));
        renderTable(filtered);
        // setelah filter, hilangkan highlight karena data berubah
        clearHighlight();
    }
    
    // Saat pencarian selesai, pastikan highlight dihapus
    if (searchInput) {
        searchInput.addEventListener('input', () => {
            handleFilter();
            clearHighlight();  // ekstra aman
        });
        searchInput.addEventListener('search', () => {
            handleFilter();
            clearHighlight();
        });
    }

    // Inisialisasi awal
    renderTable();
    
    // Tambahkan instruksi: pada HP atau desktop, geser tabel bebas
    // Pastikan wrapper bisa discroll dengan baik
    const tableWrapper = document.getElementById('tableWrapper');
    if (tableWrapper) {
        // tidak perlu modifikasi lebih lanjut, overflow auto sudah berfungsi
    }
</script>
</body>
</html>
